<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1b2a">
<link rel="manifest" href="manifest.json">
<title>Treino Cárdio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: system-ui, sans-serif;
    background: #0d1b2a; color: #e0e1dd;
    min-height: 100vh; padding: 16px;
    display: flex; flex-direction: column; align-items: center;
  }
  h1 { font-size: 1.3rem; margin-bottom: 12px; color: #778da9; }
  .flash-overlay {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; z-index: 999;
  }
  .flash-overlay.active { animation: flash .4s steps(1) 10; }
  @keyframes flash { 0%,100%{opacity:0} 50%{opacity:.85} }

  .card {
    background: #1b263b; border-radius: 16px;
    padding: 16px; margin-bottom: 12px; width: 100%; max-width: 480px;
    border: 2px solid transparent; transition: border-color .3s;
  }
  .card.big { padding: 28px; }
  .card.active-phase { border-color: #e63946; box-shadow: 0 0 20px rgba(230,57,70,.4); }
  .card.walk.active-phase { border-color: #52b788; box-shadow: 0 0 20px rgba(82,183,120,.4); }

  .label { font-size: .85rem; letter-spacing: 1px; text-transform: uppercase; color: #778da9; }
  .card.big .label { font-size: 1rem; }

  .time-display { font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card.big .time-display { font-size: 3.4rem; }
  .walk .time-display { color: #52b788; }
  .run .time-display { color: #e63946; }
  .total .time-display { color: #e0e1dd; }

  .row { display: flex; justify-content: space-between; align-items: center; }
  .adjust { display: flex; gap: 8px; margin-top: 10px; }
  .adjust button {
    flex: 1; background: #415a77; color: #fff; border: none;
    padding: 10px; border-radius: 10px; font-size: 1rem; cursor: pointer;
  }
  .adjust button:active { background: #778da9; }

  .total-controls { display: flex; gap: 8px; margin-top: 10px; }
  .total-controls button {
    flex: 1; background: #415a77; color: #fff; border: none;
    padding: 8px; border-radius: 8px; font-size: .9rem;
  }

  #startBtn {
    width: 100%; max-width: 480px; padding: 18px;
    font-size: 1.3rem; font-weight: 700; border: none; border-radius: 16px;
    background: #52b788; color: #0d1b2a; cursor: pointer; margin-top: 8px;
  }
  #startBtn.running { background: #e63946; color: #fff; }

  .status { text-align: center; margin: 8px 0; font-size: 1.1rem; min-height: 1.4em; }
  .cycles { text-align: center; color: #778da9; font-size: .9rem; }
</style>
</head>
<body>
  <div class="flash-overlay" id="flash"></div>
  <h1>🏃 Treino Cárdio na Esteira</h1>

  <div class="status" id="status">Pronto para iniciar</div>

  <!-- 2ª ferramenta: CAMINHADA (destaque) -->
  <div class="card big walk" id="cardWalk">
    <div class="label">🚶 Caminhada</div>
    <div class="time-display" id="walkDisplay">02:00</div>
    <div class="adjust">
      <button data-t="walk" data-d="-30">− 30s</button>
      <button data-t="walk" data-d="30">+ 30s</button>
    </div>
  </div>

  <!-- 3ª ferramenta: CORRIDA (destaque) -->
  <div class="card big run" id="cardRun">
    <div class="label">🏃 Corrida</div>
    <div class="time-display" id="runDisplay">01:00</div>
    <div class="adjust">
      <button data-t="run" data-d="-30">− 30s</button>
      <button data-t="run" data-d="30">+ 30s</button>
    </div>
  </div>

  <!-- 1ª ferramenta: TEMPO TOTAL (menor) -->
  <div class="card total" id="cardTotal">
    <div class="row">
      <span class="label">⏱ Tempo total</span>
      <span class="time-display" id="totalDisplay" style="font-size:1.6rem">45:00</span>
    </div>
    <div class="total-controls">
      <button data-t="total" data-d="-300">− 5min</button>
      <button data-t="total" data-d="-60">− 1min</button>
      <button data-t="total" data-d="60">+ 1min</button>
      <button data-t="total" data-d="300">+ 5min</button>
    </div>
  </div>

  <div class="cycles" id="cycles"></div>
  <button id="startBtn">▶ INICIAR</button>

<script>
// ---------- Estado ----------
const DEF = { total: 45*60, walk: 2*60, run: 1*60 };
let cfg = {
  total: +localStorage.getItem('total') || DEF.total,
  walk:  +localStorage.getItem('walk')  || DEF.walk,
  run:   +localStorage.getItem('run')   || DEF.run,
};

let running = false;
let phase = 'walk';        // fase atual quando rodando
let totalRemain = 0;
let phaseRemain = 0;
let cycleCount = 0;
let ticker = null;

// ---------- Áudio ----------
let audioCtx;
function beep() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  // 5 bips
  for (let i = 0; i < 5; i++) {
    const t = audioCtx.currentTime + i * 0.25;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = 880;
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.start(t); osc.stop(t + 0.2);
  }
}

function flash() {
  const el = document.getElementById('flash');
  el.classList.remove('active'); void el.offsetWidth;
  el.classList.add('active');
  if (navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
  setTimeout(() => el.classList.remove('active'), 4000);
}

function signal() { beep(); flash(); }

// ---------- Formatação ----------
const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

function render() {
  document.getElementById('totalDisplay').textContent = fmt(running ? totalRemain : cfg.total);
  document.getElementById('walkDisplay').textContent  = fmt(running && phase==='walk' ? phaseRemain : cfg.walk);
  document.getElementById('runDisplay').textContent   = fmt(running && phase==='run'  ? phaseRemain : cfg.run);

  document.getElementById('cardWalk').classList.toggle('active-phase', running && phase==='walk');
  document.getElementById('cardRun').classList.toggle('active-phase', running && phase==='run');
}

// ---------- Ajustes ----------
document.querySelectorAll('.adjust button, .total-controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (running) return;
    const t = btn.dataset.t, d = +btn.dataset.d;
    cfg[t] = Math.max(t==='total'?60:30, cfg[t] + d);
    localStorage.setItem(t, cfg[t]);
    render();
  });
});

// ---------- Loop ----------
function startPhase(p) {
  phase = p;
  phaseRemain = cfg[p];
  document.getElementById('status').textContent = p==='walk' ? '🚶 Caminhando...' : '🏃 Correndo!';
  render();
}

function tick() {
  totalRemain--;
  phaseRemain--;

  if (totalRemain <= 0) { finish(); return; }

  if (phaseRemain <= 0) {
    signal(); // fim da fase
    if (phase === 'walk') {
      startPhase('run');
    } else {
      cycleCount++;
      document.getElementById('cycles').textContent = `Ciclos completos: ${cycleCount}`;
      startPhase('walk');
    }
  }
  render();
}

function startWorkout() {
  running = true;
  totalRemain = cfg.total;
  cycleCount = 0;
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); // desbloqueia áudio
  audioCtx.resume();
  document.getElementById('startBtn').textContent = '⏹ PARAR';
  document.getElementById('startBtn').classList.add('running');
  document.getElementById('cycles').textContent = 'Ciclos completos: 0';
  startPhase('walk');
  ticker = setInterval(tick, 1000);
}

function stopWorkout() {
  running = false;
  clearInterval(ticker);
  document.getElementById('startBtn').textContent = '▶ INICIAR';
  document.getElementById('startBtn').classList.remove('running');
  document.getElementById('status').textContent = 'Pronto para iniciar';
  render();
}

function finish() {
  signal();
  setTimeout(signal, 1500); // sinal reforçado no fim
  document.getElementById('status').textContent = '✅ Treino concluído!';
  stopWorkout();
}

document.getElementById('startBtn').addEventListener('click', () => {
  running ? stopWorkout() : startWorkout();
});

// manter tela ligada (se suportado)
async function keepAwake() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){}
}
document.getElementById('startBtn').addEventListener('click', keepAwake);

render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
