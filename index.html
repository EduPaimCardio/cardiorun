<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <title>Cardio Treino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="flash" class="flash"></div>

  <div class="app">
    <!-- CONFIGURAÇÃO -->
    <section id="config" class="config">
      <div class="tool tool-total">
        <label>Tempo Total (min)</label>
        <div class="stepper">
          <button data-tool="total" data-delta="-1">−</button>
          <span id="totalVal">45</span>
          <button data-tool="total" data-delta="1">+</button>
        </div>
      </div>

      <div class="tools-row">
        <div class="tool tool-walk">
          <label>Caminhada</label>
          <div class="stepper">
            <button data-tool="walk" data-delta="-30">−</button>
            <span id="walkVal">02:00</span>
            <button data-tool="walk" data-delta="30">+</button>
          </div>
        </div>

        <div class="tool tool-run">
          <label>Corrida</label>
          <div class="stepper">
            <button data-tool="run" data-delta="-30">−</button>
            <span id="runVal">01:00</span>
            <button data-tool="run" data-delta="30">+</button>
          </div>
        </div>
      </div>

      <button id="startBtn" class="start-btn">INICIAR</button>
    </section>

    <!-- TREINO EM ANDAMENTO -->
    <section id="running" class="running hidden">
      <div class="phase-banner" id="phaseBanner">CAMINHADA</div>

      <div class="run-tools">
        <div class="run-tool primary">
          <label id="phaseLabel">Caminhada</label>
          <div class="big-timer" id="phaseTimer">02:00</div>
        </div>

        <div class="run-tool total-tool">
          <label>Tempo Total Restante</label>
          <div class="big-timer" id="totalTimer">45:00</div>
        </div>
      </div>

      <button id="stopBtn" class="stop-btn">PARAR (2x)</button>
      <div class="hint" id="stopHint"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
